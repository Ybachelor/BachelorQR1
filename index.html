<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Cargando...</title>
  <style>
      body {
        background-color: lightblue;
        text-align: center;
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
        margin: 0;
      }
      
      /* Estilo de carga (AQUÍ AUMENTÉ EL TAMAÑO) */
      .loader {
        font-weight: bold;
        font-family: monospace;
        font-size: 60px; /* <-- CAMBIADO DE 30px A 60px */
        display: inline-grid;
      }
      .loader:before,
      .loader:after {
        content: "Loading...";
        grid-area: 1/1;
        -webkit-mask-size: 100% 5px, 100% 100%;
        -webkit-mask-repeat: no-repeat;
        -webkit-mask-composite: xor;
        mask-composite: exclude;
        animation: l35-1 1s infinite;
      }
      .loader:before {
        -webkit-mask-image: linear-gradient(#000 0 0), linear-gradient(#000 0 0);
      }
      .loader:after {
        -webkit-mask-image: linear-gradient(#000 0 0);
        animation: l35-1 1s infinite, l35-2 0.2s infinite cubic-bezier(0.5, 200, 0.5, -200);
      }

      @keyframes l35-1 {
        0%   { -webkit-mask-position: 0 20px, 0 0 }
        20%  { -webkit-mask-position: 0 8px, 0 0 }
        40%  { -webkit-mask-position: 0 100%, 0 0 }
        60%  { -webkit-mask-position: 0 3px, 0 0 }
        80%  { -webkit-mask-position: 0 15px, 0 0 }
        100% { -webkit-mask-position: 0 0, 0 0 }
      }
      @keyframes l35-2 {
        100% { transform: translate(0.1px) }
      }
  </style>
</head>
<body>

  <script>
    const AS_URL_BASE = "https://script.google.com/macros/s/AKfycbwPh_32jh4Y_o_Y7ieHtWnHiHgga2wr5C8M36MJ8OHaN7B8TcNzRiZrQuaZQsKxa03TqQ/exec";
    
    var url = document.location.href;
    var k = url.substr(url.lastIndexOf("k=")+2);
    
    if(k){
      fetch(AS_URL_BASE+'?k='+k)
      .then(r => r.text())
      .then((r) => {
        console.log(r);
        if(r){
          document.location.replace(r);
        }
      })
      .catch(err => console.log(err))
    }
  </script>
  
  <div class="loader"></div>
  
</body>
</html>
